<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESP PDF to JSON Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; border-radius: 8px; margin-bottom: 20px; background-color: #f9f9f9; }
        pre { background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; min-height: 200px; white-space: pre-wrap; word-wrap: break-word;}
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #0056b3; color: white; border: none; border-radius: 4px;}
        button:hover { background-color: #004494; }
    </style>
</head>
<body>

    <h2>RESP Statement Extractor</h2>
    <p>Upload your iA Financial Group PDF to extract the data into JSON format. Everything runs locally in your browser.</p>

    <div class="upload-area">
        <input type="file" id="pdf-upload" accept="application/pdf" style="display: none;">
        <button onclick="document.getElementById('pdf-upload').click()">Select PDF File</button>
        <p id="file-name" style="margin-top: 15px; color: #555;"></p>
    </div>

    <h3>Output:</h3>
    <pre id="json-output">Awaiting file upload...</pre>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        document.getElementById('pdf-upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('file-name').innerText = `Processing: ${file.name}...`;
            document.getElementById('json-output').innerText = "Extracting text from PDF...";

            let fullText = "";

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageStrings = textContent.items.map(item => item.str);
                    fullText += pageStrings.join(" ") + "\n"; 
                }

                const jsonData = parseRESPText(fullText);
                document.getElementById('json-output').innerText = JSON.stringify(jsonData, null, 2);
                document.getElementById('file-name').innerText = `Finished: ${file.name}`;

            } catch (error) {
                console.error("FULL ERROR:", error);
                document.getElementById('json-output').innerText = 
                    "ERROR OCCURRED: " + error.message + 
                    "\n\n--- RAW TEXT EXTRACTED (Share this to fix the regex) ---\n\n" + fullText;
            }
        });

        function parseRESPText(text) {
            const data = {};

            const contractMatch = text.match(/Contract no\.\s*:?\s*(\d+)/i);
            if (contractMatch) data.contractId = parseInt(contractMatch[1], 10);

            const dateMatch = text.match(/As at ([A-Z][a-z]+ \d{1,2}, \d{4})/i);
            if (dateMatch) {
                const dateObj = new Date(dateMatch[1]);
                data.statementDate = dateObj.toISOString().split('T')[0];
            }

            const balanceMatch = text.match(/Total of your investments[^\$]+\$([\d,]+\.\d{2})/i);
            if (balanceMatch) data.balanceTotal = parseFloat(balanceMatch[1].replace(/,/g, ''));

            const rateMatch = text.match(/Investment funds:?\s*([\d\.]+)%/i);
            if (rateMatch) data.rateYTD = parseFloat(rateMatch[1]) / 100;

            const padRegex = /([\d]+-NSC-[^"$\n]+)\s*\$([\d,]+\.\d{2})/g;
            const padDict = {};
            for (const match of text.matchAll(padRegex)) {
                padDict[match[1].trim()] = parseFloat(match[2].replace(/,/g, ''));
            }

            const freqMatch = text.match(/each (month|week|year)/i);
            const frequency = freqMatch ? freqMatch[1].toLowerCase() + 'ly' : 'monthly';

            const funds = [];
            const fundRegex = /([\d]+-NSC-[A-Za-z\.\s\(\)-]+?)\s*(?:[\d\.]+\s*)?(?:\$[\d\.,]+\s*)?\$([\d,]+\.\d{2})\s*([\d\.]+)%/g;
            
            for (const match of text.matchAll(fundRegex)) {
                const fundName = match[1].trim();
                funds.push({
                    fundName: fundName,
                    fundValue: parseFloat(match[2].replace(/,/g, '')),
                    retrunYTD: parseFloat(match[3]),
                    fundPad: padDict[fundName] || 0.0,
                    frequencyPad: frequency
                });
            }
            data.Funds = funds;

            function getCumulative(labelPattern) {
                // Find the label, skip the first dollar amount (current year), grab the second (cumulative)
                const regex = new RegExp(labelPattern + '[^\\$]+\\$[\\d,]+\\.\\d{2}[^\\$]+\\$([\\d,]+\\.\\d{2})', 'i');
                const match = text.match(regex);
                return match ? parseFloat(match[1].replace(/,/g, '')) : 0;
            }

            // Removed FederalTotal
            data.assistedCont = getCumulative("Assisted contributions");
            data.unassistedCont = getCumulative("Unassisted contributions");
            data.grantsReceived = getCumulative("Grants received");
            data.provGrant = getCumulative("Provincial grant"); // Simplified to avoid dash/hyphen issues
            data.canadaLearning = getCumulative("Canada Learning Bond");

            return data;
        }
    </script>
</body>
</html>
